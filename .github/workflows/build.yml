name: build-exe

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["app.py", "rebuild.py", "glossaries/**", ".github/workflows/build.yml"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build PDFTranslate.exe
        run: >
          pyinstaller --onefile --windowed --name PDFTranslate
          --add-data "glossaries;glossaries"
          app.py

      - name: Smoke check
        run: dir dist

      - name: Upload artifact (tai ve tu tab Actions)
        uses: actions/upload-artifact@v4
        with:
          name: PDFTranslate-windows
          path: dist/PDFTranslate.exe

      - name: Release (khi push tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDFTranslate.exe
